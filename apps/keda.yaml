apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: addons
  source:
    repoURL: 'https://github.com/whoemai/git_addons.git'
    targetRevision: HEAD
    path: addons/keda
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: keda
  ignoreDifferences:
    - group: "apps"
      kind: "Deployment"
      jsonPointers:
        - /status/terminatingReplicas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
