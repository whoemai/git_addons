apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-addons
  namespace: argocd
  # The cascading finalizer ensures that when the root-addons app is deleted,
  # all child applications (addons) are also cleanly deleted.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # IMPORTANT: Replace this repoURL with your actual Git repository URL
    repoURL: 'https://github.com/your-username/git_addons.git'
    targetRevision: HEAD
    path: apps
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
