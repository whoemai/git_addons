external-dns:
  provider: azure
  
  extraVolumes:
    - name: azure-config-file
      secret:
        secretName: azure-config-file
  extraVolumeMounts:
    - name: azure-config-file
      mountPath: /etc/kubernetes
      readOnly: true
  
  sources:
    - service
    - ingress
    
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
